server {
    listen 80;
    server_name _;
    sendfile off;

    root /usr/share/nginx/html;
    index index.html;

    # Root of the domain just redirects visitors to the admin SPA.
    location = / {
        return 301 /admin/;
    }

    # Allow `/admin` (no trailing slash) to reach the SPA shell as well.
    location = /admin {
        return 301 /admin/;
    }

    # SPA shell: must always return the freshly built index.html and never
    # be cached, otherwise users keep an old shell that references purged
    # asset hashes after a deploy.
    location = /admin/ {
        try_files /admin/index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        expires -1;
    }

    location = /admin/index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        expires -1;
    }

    # Hashed Vite bundles: safe to cache aggressively. The `^~` prefix makes
    # sure this block wins over the generic `/admin/` proxy below and assets
    # are NEVER forwarded to FastAPI (which would return JSON and break the
    # MIME type, producing the white-screen error in the browser).
    location ^~ /admin/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Everything else under `/admin/` is shared between SPA static files
    # (favicon, AAT.png, ...) and FastAPI admin endpoints
    # (`/admin/auth/...`, `/admin/reports`, `/admin/analytics/...`,
    # `/admin/audit-logs`). If the file exists on disk we serve it as
    # static; otherwise we fall back to the API upstream.
    location /admin/ {
        try_files $uri @admin_api;
    }

    location @admin_api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthz {
        proxy_pass http://backend:8000/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
