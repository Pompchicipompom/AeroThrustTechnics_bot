name: aerotrust

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "20", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host ${API_HOST:-0.0.0.0}
      --port ${API_PORT:-8000}
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${API_PORT:-8000}/healthz')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 6

  bot:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: ["python", "-m", "app.bot.runner"]
    volumes:
      - uploads_data:/app/uploads

  admin:
    build:
      context: ./admin
    restart: unless-stopped
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
